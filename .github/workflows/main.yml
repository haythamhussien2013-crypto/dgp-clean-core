echo "Server Hostname:"
          hostname
          echo "Test Completed Successfully"
          echo "-----------------------------"

      - name: Generate Clean Report
        run: |
          echo "DGP SYSTEM REPORT" > report.txt
          echo "==================" >> report.txt
          echo "System Status: OK" >> report.txt
          echo "Levels: 1, 2, 3 Passed" >> report.txt
          echo "Timestamp:" >> report.txt
          date >> report.txt
          echo "Report generated successfully."

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dgp-report
          path: report.txt