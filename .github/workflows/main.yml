name: Entropy and Rody Tests
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy
      - name: Run entropy test
        run: python entropy.py
      - name: Run Rody core
        run: |
          cd CORE/ai/RODY_CORE
          chmod +x *.sh
          ./egypt_start.sh
