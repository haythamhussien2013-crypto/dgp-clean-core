name: DGP Clean Start

on:
  push:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Create test file
        run: |
          mkdir -p tests
          echo "import time" > tests/test.py
          echo "print('🔥 DGP SYSTEM STARTED')" >> tests/test.py
          echo "print('Level 1 OK')" >> tests/test.py
          echo "print('Level 2 OK')" >> tests/test.py
          echo "start=time.time()" >> tests/test.py
          echo "for i in range(1000000): pass" >> tests/test.py
          echo "print('Time:', time.time()-start)" >> tests/test.py
          echo "print('ALL GOOD')" >> tests/test.py

      - name: Run test
        run: python tests/test.py
